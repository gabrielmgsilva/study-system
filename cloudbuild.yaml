substitutions:
  _REGION: us-central1
  _SERVICE: study-system
  _NEXT_PUBLIC_APP_URL: https://yourdomain.com
  _NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_51TG00NQXlYRnq1ydCypsfbmY9AhYTI0Wa82MHydbxJjTQA06e7mUnLNvQ5NWmMzPWVQe81vjUssrwsGL3x3oiJ5M001uORo8ga

steps:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    env:
      - DOCKER_BUILDKIT=1
    args:
      - build
      - --cache-from
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:latest
      - --build-arg
      - NEXT_PUBLIC_APP_URL=$_NEXT_PUBLIC_APP_URL
      - --build-arg
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:$COMMIT_SHA
      - --tag
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:latest
      - .

  # ── 2. Push ───────────────────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE
    waitFor:
      - build

  # ── 3. Deploy ─────────────────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:$COMMIT_SHA
      - --region=$_REGION
      - --service-account=$_SERVICE@$PROJECT_ID.iam.gserviceaccount.com
      - --add-cloudsql-instances=$PROJECT_ID:$_REGION:$_SERVICE
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,MAIL_FROM=MAIL_FROM:latest,RESEND_FROM=RESEND_FROM:latest
      - --min-instances=0
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --port=3000
      - --allow-unauthenticated
    waitFor:
      - push

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/$_SERVICE/$_SERVICE:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
